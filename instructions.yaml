# VPN Manager — Instructions Configuration
# Edit this file to update instruction texts. Restart bot or use admin "Обновить инструкцию" button.
# Supports Telegram HTML markup: <b>, <i>, <code>, <pre>, <a href="">.

full_instruction: |
  <b>📖 Полная инструкция по настройке VPN</b>

  <b>1. Скачайте приложение</b>
  • Android — V2rayNG (Google Play)
  • iOS — Streisand (App Store)
  • Windows — v2rayN
  • macOS — V2Box

  <b>2. Получите ссылку подписки</b>
  В главном меню бота нажмите «Мои подписки» → выберите подписку → скопируйте Subscription URL.

  <b>3. Добавьте подписку в приложение</b>
  Откройте приложение → нажмите «+» → «Import from clipboard» → вставьте ссылку.

  <b>4. Подключитесь</b>
  Выберите сервер из списка → нажмите Connect. Индикатор загорится зелёным — вы подключены.

  <b>Если нужна помощь</b> — напишите админу.

step_by_step:
  steps:
    - title: "Шаг 1 из 5: Скачайте приложение"
      text: |
        📱 <b>Скачайте VPN-клиент</b>

        Для вашего устройства:
        • Android — V2rayNG
        • iOS — Streisand
        • Windows — v2rayN
        • macOS — V2Box
      media: null

    - title: "Шаг 2 из 5: Получите ссылку"
      text: |
        🔗 <b>Получите ссылку подписки</b>

        1. Нажмите «Мои подписки» в главном меню
        2. Выберите подписку
        3. Скопируйте Subscription URL
      media: null

    - title: "Шаг 3 из 5: Добавьте подписку"
      text: |
        ➕ <b>Добавьте подписку в приложение</b>

        1. Откройте VPN-приложение
        2. Нажмите «+»
        3. Выберите «Import from clipboard»
        4. Вставьте скопированную ссылку
      media: null

    - title: "Шаг 4 из 5: Выберите сервер"
      text: |
        🌍 <b>Выберите сервер</b>

        В приложении появится список серверов.
        Выберите ближайший к вам для лучшей скорости.
      media: null

    - title: "Шаг 5 из 5: Подключитесь"
      text: |
        ✅ <b>Подключитесь</b>

        Нажмите на выбранный сервер → Connect.
        Индикатор должен загореться зелёным.

        Если не подключается — попробуйте другой сервер.
      media: null

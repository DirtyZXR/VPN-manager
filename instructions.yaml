full_instruction: |
  <b>📖 Полная инструкция по настройке VPN</b>

  <b>1. Скачайте приложение</b>
  Для работы с протоколом VLESS необходимо установить соответствующий клиент. Вы можете выбрать любой: Hiddify, V2rayNG или другой по вашему усмотрению.

  Моя рекомендация - использовать приложение HAPP. Оно простое в использовании и поддерживает все устройства:
  • Android: [HAPP для Android](https://play.google.com/store/apps/details?id=com.happproxy&pli=1)
  • iOS: [HAPP для iOS] - ссылка врменно остуствует. Но вы по можете найти его в App Store по запросу "HAPP Proxy Utility"
  • Windows: https://github.com/Happ-proxy/happ-desktop/releases/latest/download/setup-Happ.x64.exe
  • macOS: https://apps.apple.com/us/app/happ-proxy-utility/id6504287215?platform=mac


  <b>2. Получите ссылку подписки</b>
  Если вам уже пришло уведомление о создании подписки:

  В главном меню бота нажмите «Все ссылки подписок» → скопировать все URL → скопируйте сообщение.

  <b>3. Добавьте подписку в приложение</b>
  Откройте приложение → нажмите «+» → «Вставить из буфера обмена».

  <b>4. Подключитесь</b>
  Выберите сервер из списка → нажмите кнопку подключения.

  <b>Важные моменты</b>
  • Переодически обновляйте подписки(значок с двумя стелочками), т.к. их параметры могут меняться, и без обновления они перестанут работать.
  • Кнопка пинг (значок спидометра) показывает скорость отклика сервера. Можно использовать для проверки работспособности соединения. Но полагаться на его данные не стоит, т.к. он может показывать некорректные значения скорости из-за особенностей протокола VLESS.
  • Для надежности используйте кнопку пинг несколько раз подряд.

  <b>Особенности подписок</b>
  • Подключение с названием ВПН+обход означает, что сойденение будет работать в условиях блокировок и иметь доступ к заблокированным ресурсам.
  • Подключение с названием ВПН означает, что соединение не будет работать в условиях блокировок, но будет иметь доступ к заблокированным ресурсам(классический VPN).
  • Подключение с названием Обход означает, что соединение будет работать в условиях блокировок, но не будет иметь доступ к заблокированным ресурсам(прокси).


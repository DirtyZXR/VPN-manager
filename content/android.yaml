full_instruction: |
  <b>Полная инструкция для Android</b>
  Вы можете воспользоваться любым клиентом, поддерживающий протокол, который вам нравится.
  Мой личный совет, приложение <b>v2rayTUN</b>. Скачать: <a href="https://play.google.com/store/apps/details?id=com.v2raytun.android&hl=ru">ссылка</a>.
  Если у вас уже есть актвиная подписка переходите к следующему пункту, если нет, нажмите на кнопку "Запросить подписку".

  Скопируйте сначала одну ссылку, из подпсики что у вас есть.
  После установки, откройте приложение и нажмите на кнопку "+". Выберите "Импорт из буфера обмена". Если у вас в подпсике больше одной ссылки, повторите этот процесс.

  Вы можете првоерить доступность серверов, нажав на три точки в верхнем правом углу и нажав на кнопку "Проверка доступности конфигов". Сам пинг не всегда отображается верно, но если сервер не доступен, он будет отмечен как "-1".

  Подкючения с надписью "Обход" - обходят белые списки
  Подключения с надписью "ВПН" - работают как обычный VPN, без обхода белых списков. Вы можете выбрать любой из них, в зависимости от ваших потребностей в текущий момент.

  ВНИМАТЕЛЬНО проверяйте, страну сервера. Российские сервера дают доступ к Телграму и Инстаграму, но остальные ресурсы заблокированые в РФ работать не будут.
  Российсике сервера также подойдут, если вам необходим доступ, например, к онлайн-банкингу, который блокирует доступ из страны отличной от РФ.

step_by_step:
  steps:
    - title: "Скачайте клиент"
      text: "Моя рекомендация - <b>v2rayTUN</b>. Скачать: <a
        href=\"https://play.google.com/store/apps/details?id=com.v2raytun.andro\
        id&hl=ru\">ссылка</a>. Но вы можете использовать любой другой клиент."
      media: "content/images/android_app.png"

    - title: "Скопируйте ссылку из подписки"
      text: "Скопируйте ссылку из вашей подписки, которую вы получили после оплаты."
      media: "content/images/telegram_sub.png"

    - title: "Импортируйте ссылку в приложение"
      text: |
        "Откройте приложение и нажмите на кнопку \"+\" и выберите \"Добавить из буфера обмена\".
        Если у вас в подписке больше одной ссылки, повторите этот процесс для каждой ссылки."
      media: "content/images/android_add_sub.png"

    - title: "Проверьте доступность серверов"
      text: |
        "Нажмите на три точки в верхнем правом углу и выберите \"Проверка
        доступности конфигов\". Серверы, которые не доступны, будут отмечены как
        \"-1\"."

        "Подключения с надписью \"Обход\" - обходят белые списки.
        Подключения с надписью \"ВПН\" - работают как обычный VPN, без обхода белых списков. Выберите любой из них в зависимости от ваших потребностей."
        "ВНИМАТЕЛЬНО проверяйте страну сервера. Российские сервера дают доступ к Телграму и Инстаграму, но остальные ресурсы, заблокированные в РФ, работать не будут.
        Российские сервера также подойдут, если вам необходим доступ, например, к онлайн-банкингу, который блокирует доступ из страны отличной от РФ."
        "Нажмите на сервер, который вы выбрали, и нажмите \"Подключиться\"."
        "Откройте любой заблокированный ресурс и проверьте, работает ли он."

      media: "content/images/android_check_con.png"
